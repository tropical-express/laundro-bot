version: "3.8"

services:

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ~/.n8n:/home/node/.n8n
      - ./data:/data
      - ./scripts:/data/scripts

  bot:
    build: ./bot
    volumes:
      - ./data:/data
      - ./bot:/app
    working_dir: /app
    command: tail -f /dev/null

  dashboard:
    image: python:3.11
    ports:
      - "5000:5000"
    volumes:
      - ./dashboard:/app
      - ./data:/data
    working_dir: /app
    command: python app.py
